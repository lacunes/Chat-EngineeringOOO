{% extends "base.html" %}
{% block title %}高级编辑 - {{ name }}{% endblock %}
{% block content %}
<h1 class="page-title">🌍 高级编辑: {{ name }}</h1>
<div class="mode-bar">
  <span class="text-muted">源码编辑模式 — {{ content.split('\n')|length }} 行</span>
  <a href="{{ url_for('worlds.edit_world', name=name) }}">📋 普通模式（表单编辑）</a>
</div>

<div class="advanced-warning">
  ⚠ 高级模式会直接修改 Python 世界文件，语法错误可能导致 Bot 无法启动。<br>
  保存前会自动备份原文件并检查语法。
</div>

{% if error %}<div class="flash-msg flash-error show">{{ error }}</div>{% endif %}

<div class="card">
  <form method="post" action="{{ url_for('worlds.save_world', name=name) }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="mode" value="raw">
    <textarea name="content" class="code-editor" style="min-height:500px;">{{ content }}</textarea>
    <div class="btn-group" style="margin-top:12px;">
      <button type="submit" class="btn btn-primary" data-confirm="确认保存？语法错误可能导致世界加载失败。">💾 保存</button>
      <a href="{{ url_for('worlds.list_worlds') }}" class="btn btn-ghost">取消</a>
    </div>
  </form>
</div>
{% endblock %}
