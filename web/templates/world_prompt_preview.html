{% extends "base.html" %}
{% block title %}Prompt 预览{% endblock %}
{% block content %}
<h1 class="page-title">📋 Prompt 预览 - {{ world_name }}</h1>
<p class="page-subtitle">这是构建后发送给模型的完整系统提示词预览（第二阶段完善）</p>
<div class="card">
  <pre style="white-space:pre-wrap;font-family:var(--font-mono);font-size:13px;line-height:1.6;color:var(--text-secondary);">{{ prompt_text }}</pre>
</div>
<a href="{{ url_for('worlds.edit_world', name=world_name) }}" class="btn btn-ghost">← 返回编辑</a>
{% endblock %}
